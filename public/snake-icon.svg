<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer rounded square bg -->
  <rect width="100" height="100" rx="22" fill="#0a2210"/>
  <rect x="8" y="8" width="84" height="84" rx="18" fill="#0f2a14"/>

  <!-- Snake body segments (overlapping circles + rects for pixel-snake feel) -->
  <!-- Row 3 (bottom): segments going left -->
  <circle cx="38" cy="62" r="10" fill="#22c55e"/>
  <circle cx="52" cy="62" r="10" fill="#22c55e"/>
  <circle cx="66" cy="62" r="10" fill="#22c55e"/>
  <!-- Col right: going up -->
  <circle cx="66" cy="48" r="10" fill="#22c55e"/>
  <circle cx="66" cy="34" r="10" fill="#22c55e"/>
  <!-- Row 1 (top): head segment going left -->
  <circle cx="52" cy="34" r="10" fill="#16a34a"/>

  <!-- Fill rects between circles for solid body -->
  <rect x="28" y="52" width="20" height="20" rx="2" fill="#22c55e"/>
  <rect x="42" y="52" width="20" height="20" rx="2" fill="#22c55e"/>
  <rect x="56" y="52" width="20" height="20" rx="2" fill="#22c55e"/>
  <rect x="56" y="38" width="20" height="20" rx="2" fill="#22c55e"/>
  <rect x="56" y="24" width="20" height="20" rx="2" fill="#22c55e"/>
  <rect x="42" y="24" width="20" height="20" rx="2" fill="#16a34a"/>

  <!-- Eyes -->
  <circle cx="48" cy="30" r="2.5" fill="#bbf7d0"/>
  <circle cx="60" cy="30" r="2.5" fill="#bbf7d0"/>
  <!-- Pupils -->
  <circle cx="47" cy="30" r="1.2" fill="#0a1a0d"/>
  <circle cx="59" cy="30" r="1.2" fill="#0a1a0d"/>

  <!-- Tongue -->
  <rect x="45" y="36" width="1.5" height="5" rx="0.75" fill="#f87171"/>
  <rect x="63" y="36" width="1.5" height="5" rx="0.75" fill="#f87171"/>
  <rect x="43.5" y="40" width="1.5" height="3" rx="0.75" fill="#f87171" transform="rotate(-20 44 40)"/>
  <rect x="47" y="40" width="1.5" height="3" rx="0.75" fill="#f87171" transform="rotate(20 47 40)"/>

  <!-- Tail tip -->
  <rect x="26" y="62" width="10" height="4" rx="2" fill="#4ade80"/>
  <rect x="24" y="64" width="6" height="3" rx="1.5" fill="#4ade80"/>
</svg>